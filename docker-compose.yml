# Sobe Postgres + Redis para desenvolvimento local.
#   docker compose up -d
# Depois: cp .env.local.example .env.local && npm install && npm run db:push && npm run db:seed
services:
  postgres:
    image: postgres:16-alpine
    container_name: busqueioferta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: busqueioferta
      POSTGRES_PASSWORD: busqueioferta
      POSTGRES_DB: busqueioferta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busqueioferta"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: busqueioferta-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
